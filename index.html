<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Belanja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <h2 class="text-center bg-primary text-white p-3 rounded mt-3">Catatan Belanja</h2>
        Nama Barang
        <input type="text" id="namaBarang" class="form-control border-primary mb-3">
        Jumlah
        <input type="text" id="jumlah" class="form-control border-primary mb-3">
        Keterangan
        <input type="text" id="keterangan" class="form-control border-primary mb-3">

        <button class="btn btn-primary" onclick="simpan()">Simpan</button>

        <div id="list-produk" class="row"></div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4">
        <div class="card h-100 shadow-sm">
            <img src="https://picsum.photos/400/250?random=20" class="card-img-top" alt="Project 1">
            <div class="card-body">
                <h5 class="card-title">Website Toko Online</h5>
                <p class="card-text">Website e-commerce responsif dengan fitur keranjang belanja.</p>
                <span class="badge bg-primary me-1">HTML</span>
                <span class="badge bg-success me-1">CSS</span>
                <span class="badge bg-warning text-dark">Bootstrap</span>
            </div>
        </div>
    </div>

    <script src="scriptls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
